services:
  - type: web
    name: educenter-api
    runtime: docker
    # Paths are resolved from the repo root, not from dockerContext.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: EduCenter
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Generate locally with: php artisan key:generate --show
      # then paste the base64:... value into the Render dashboard.
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: educenter-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: educenter-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: educenter-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: educenter-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: educenter-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

      # Comma-separated frontend origins, e.g. https://educenter.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: educenter-db
    plan: free
    databaseName: educenter
    user: educenter
