services:
  - type: web
    name: educenter-api
    runtime: docker
    # Paths are resolved from the repo root, not from dockerContext.
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: EduCenter
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      # Generate locally with: php artisan key:generate --show
      # then paste the base64:... value into the Render dashboard.
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: educenter-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: educenter-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: educenter-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: educenter-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: educenter-db
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

      # Comma-separated frontend origins, e.g. https://educenter.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false

      # Base URL of the SPA — invitation links are built against this.
      - key: FRONTEND_URL
        sync: false

      # Demo data seeds on boot by default (the login page offers a demo
      # account). Set to "false" to stop seeding it. Idempotent either way.
      - key: SEED_DEMO
        value: "true"

      # Any standard SMTP provider works; set these in the dashboard.
      #   Gmail: smtp.gmail.com / 587 / tls / <you>@gmail.com / <app password>
      #   Brevo: smtp-relay.brevo.com / 587 / tls / <login> / <smtp key>
      #  Resend: smtp.resend.com / 587 / tls / resend / <api key>
      #          (requires a verified domain to mail arbitrary recipients)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_SCHEME
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: EduCenter

databases:
  - name: educenter-db
    plan: free
    databaseName: educenter
    user: educenter
